header:
  version: 14
  includes:
    - repo: meta-ros
      file: kas/oeros-scarthgap-jazzy-raspberrypi5.yml

repos:
  meta-bumperbot:
    path: .

  meta-ros:
    url: "https://github.com/ros/meta-ros.git"
    branch: build
    layers:
      .: "disabled"

target:
  - ros-image-core

local_conf_header:
  bumperbot: |
    # Bumperbot ROS2 packages install
    IMAGE_INSTALL:append = " \
        bumperbot-bringup \
        bumperbot-systemd \
    "

  host_tools: |
    ASSUME_PROVIDED += "git-native"
    PREFERRED_PROVIDER_git-native = "git-native"
    HOSTTOOLS += "git"
    HOSTTOOLS:remove = "gfortran"

  serial: |
    ENABLE_UART = "1"
    LICENSE_FLAGS_ACCEPTED += "synaptics-killswitch"
    IMAGE_INSTALL:append = " python3-smbus python3-pyserial"

  networking: |
    IMAGE_INSTALL:append = " \
      networkmanager \
      networkmanager-wifi \
      networkmanager-nmcli \
      wpa-supplicant \
      linux-firmware-rpidistro-bcm43455 \
    "
    IMAGE_INSTALL:remove = " connman"
    PACKAGECONFIG:remove:pn-systemd = "networkd"

    SYSTEMD_AUTO_ENABLE:pn-networkmanager = "enable"
    SYSTEMD_AUTO_ENABLE:pn-systemd-resolved = "enable"

    # Enable WiFi support at the distribution level
    DISTRO_FEATURES:append = " wifi"

    # Install custom network manager profiles
    IMAGE_INSTALL:append = " network-profiles"

  bluetooth: |
    # Enable Bluetooth support at the distribution level
    DISTRO_FEATURES:append = " bluetooth"

    # bluez5: Provides the core Bluetooth stack and bluetoothctl
    # pi-bluetooth: Sets up the hciattach/hciuart service required for Raspberry Pi's onboard BT chip
    IMAGE_INSTALL:append = " bluez5 pi-bluetooth"

    # Ensure the Bluetooth daemon starts automatically on boot
    SYSTEMD_AUTO_ENABLE:pn-bluez5 = "enable"

  ssh: |
    # Adds the SSH server to the image
    EXTRA_IMAGE_FEATURES += "ssh-server-openssh"

    # Allow root login without a password (for development only)
    EXTRA_IMAGE_FEATURES += "debug-tweaks"
